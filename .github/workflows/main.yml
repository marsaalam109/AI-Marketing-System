name: AI Marketing System

on:
  workflow_dispatch:

jobs:
  marketing:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Node
        run: node -v
       - name: Show Repository Files
        run: |
        pwd
        ls -la
        ls -la scripts
      - name: Run Keyword Hunter
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/keyword-hunter.js
